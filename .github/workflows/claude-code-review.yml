name: Claude Code Review

on:
  pull_request:
    branches: [ main ]
    types: [ opened, ready_for_review ]
    # Optional: Only run on specific file changes
    paths-ignore:
      - '**/*.md'  # Skip documentation-only changes
  issue_comment:
    types: [ created ]  # Only on new comments

jobs:
  claude-review:
    # Run on non-fork PR events OR when a repo member comments "claude: force review"
    if: |
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
          github.event.action == 'ready_for_review'
        )
      ) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body || '', 'claude: force review') &&
        contains(fromJSON('["MEMBER", "OWNER"]'), github.event.comment.author_association)
      )
    
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    # Limit to one Claude review at a time for a given PR
    concurrency:  
      group: claude-review-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          
          # Optional: Specify model (defaults to Claude Sonnet 4, uncomment for Claude Opus 4)
        #   model: "claude-opus-4-20250514"
          
          # Direct prompt for automated review (no @claude mention needed)
          direct_prompt: |
            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Appropriate balance between code complexity and readability, especially with regard to functional and object-oriented design
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage

            Code in this repository heavily leverages and references an upstream library
            of foundational tools at https://github.com/Arbol-Project/gridded-etl-tools.
            Please review the code in the context of the upstream library.

            For further context, ETL managers created in this repository will be run and orchestrated
            using Prefect. The code for that resides at https://github.com/Arbol-Project/prefect-etl-orchestration.
            You do not need to concern yourself with orchestration when reviewing code in this repository
            but this context should help you conceptually understand how the managers are implemented.

            Be constructive, helpful, and concise in your feedback.
          
          # Optional: Customize review based on file types
          # direct_prompt: |
          #   Review this PR focusing on:
          #   - For TypeScript files: Type safety and proper interface usage
          #   - For API endpoints: Security, input validation, and error handling
          #   - For React components: Performance, accessibility, and best practices
          #   - For tests: Coverage, edge cases, and test quality
          
          # Optional: Different prompts for different authors
          # direct_prompt: |
          #   ${{ github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR' && 
          #   'Welcome! Please review this PR from a first-time contributor. Be encouraging and provide detailed explanations for any suggestions.' ||
          #   'Please provide a thorough code review focusing on our coding standards and best practices.' }}
          
          # Optional: Add specific tools for running tests or linting
          # allowed_tools: "Bash(npm run test),Bash(npm run lint),Bash(npm run typecheck)"
          
          # Optional: Skip review for certain conditions
          # if: |
          #   !contains(github.event.pull_request.title, '[skip-review]') &&
          #   !contains(github.event.pull_request.title, '[WIP]')