name: Claude Code Review

on:
  pull_request:
    branches: [ main ]
    types: [ opened, ready_for_review ]
    paths-ignore:
      - '**/*.md'
  issue_comment:
    types: [ created ]

jobs:
  claude-review:
    # Run on PR events OR when "claude: force review" comment is added to a ready-for-review PR.
    # The bot login check prevents a feedback loop: the review action posts comments via
    # github-actions[bot], which fires new issue_comment events that would cancel the
    # in-progress review run via the concurrency group.
    if: |
      (github.event_name == 'pull_request' &&
        (
          (github.event.action == 'opened' && github.event.pull_request.draft == false) ||
          github.event.action == 'ready_for_review'
        )
      ) ||
      (github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        github.event.comment.user.login != 'github-actions[bot]' &&
        contains(github.event.comment.body || '', 'claude: force review')
      )

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    concurrency:
      group: claude-review-${{ github.event_name == 'pull_request' && github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # This role is maintained via clickops in the Arbol prod data account
          role-to-assume: arn:aws:iam::629730964333:role/claude-pr-review
          aws-region: us-east-1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          use_bedrock: true
          claude_args: |
            --model us.anthropic.claude-opus-4-6-v1
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Appropriate balance between code complexity and readability, especially with regard to functional and object-oriented design
            - Potential bugs or regressions
            - Performance considerations
            - Security concerns
            - Test coverage

            IMPORTANT — Downstream impact:
            This is a library consumed by downstream ETL implementations. Almost every
            line of code is exercised by downstream consumers, so even small changes can
            introduce non-intuitive regressions. Pay close attention to whether changes
            could subtly alter behavior that existing consumers depend on.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` to highlight specific code issues.
            Be constructive, helpful, and concise in your feedback.
