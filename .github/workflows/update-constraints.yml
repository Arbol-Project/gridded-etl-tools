name: Update constraints.txt

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-constraints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.10"
      - name: Export constraints
        run: uv export --frozen --no-hashes -o constraints.txt
      - name: Commit if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet constraints.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git add constraints.txt && git commit -m "chore: update constraints.txt" && git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Dispatch to prefect-etl-orchestration
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl --fail -X POST https://api.github.com/repos/Arbol-Project/prefect-etl-orchestration/dispatches \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            --data '{"event_type": "non-gridded-etl-managers-constraints-updated", "client_payload": {"repository": "'"$GITHUB_REPOSITORY"'"}}'
