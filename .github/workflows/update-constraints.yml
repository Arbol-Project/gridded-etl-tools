name: Update constraints.txt

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  update-constraints:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          version: "0.11.10"
      - name: Export constraints
        run: uv export --frozen --no-hashes -o constraints.txt
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet constraints.txt || (git add constraints.txt && git commit -m "chore: update constraints.txt" && git push)
