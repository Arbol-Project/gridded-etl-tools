name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    if: ${{ !github.event.pull_request.draft && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Install external dependencies via APT
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05  # v1.6.0
        with:
          packages: cdo netcdf-bin libeccodes0
          version: 1.0
      - name: Refresh dynamic linker cache
        run: sudo ldconfig

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          version: "0.11.10"

      - name: Run unit tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TESTING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TESTING_AWS_SECRET_ACCESS_KEY }}
        run: |
          uv run pytest \
            --log-level=INFO \
            --log-cli-level=INFO \
            --cov=gridded_etl_tools \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            tests/unit

      - name: Run system tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TESTING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TESTING_AWS_SECRET_ACCESS_KEY }}
        run: |
          uv run pytest \
            --log-level=INFO \
            --log-cli-level=INFO \
            --cov=gridded_etl_tools \
            --cov-append \
            --cov-config=.coveragerc \
            --cov-report=term-missing:skip-covered \
            tests/system

      - name: Enforce combined coverage
        run: uv run coverage report --fail-under=100 --show-missing
