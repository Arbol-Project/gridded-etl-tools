name: Run tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  tests:
    name: Tests (Python ${{ matrix.python-version }})
    if: ${{ !github.event.pull_request.draft && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Install external dependencies via APT
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: cdo netcdf-bin
          version: 1.0

      - uses: actions/checkout@v4

      - uses: ./.github/setup
        with:
          python-version: ${{ matrix.python-version }}
          extra: "--extra testing"

      - name: Run unit tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TESTING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TESTING_AWS_SECRET_ACCESS_KEY }}
        run: |
          uv run pytest \
            --log-level=INFO \
            --log-cli-level=INFO \
            --cov=gridded_etl_tools \
            --cov=tests.unit \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            tests/unit

      - name: Run system tests
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TESTING_AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TESTING_AWS_SECRET_ACCESS_KEY }}
        run: |
          uv run pytest \
            --log-level=INFO \
            --log-cli-level=INFO \
            --cov=tests.system \
            --cov-append \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-fail-under=100 \
            tests/system
